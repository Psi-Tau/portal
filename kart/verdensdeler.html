<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdenskart Spill: Verdensdeler</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- D3.js for kart og interaksjon -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Forhindrer scroll utenfor kartet */
        }
        
        /* Kartstiler */
        .country {
            stroke: #94a3b8;
            stroke-width: 0.5px;
            vector-effect: non-scaling-stroke; /* Holder linjene tynne selv når man zoomer */
            transition: fill 0.2s ease;
            fill: #e2e8f0; /* Standardfarge for alle land */
        }
        
        /* Hover-effekt som gjelder for hele verdensdelen */
        .continent-hover {
            fill: #bae6fd !important; /* Lys blå farge når man holder over */
            cursor: pointer;
        }
        
        .guessed {
            fill: #4ade80 !important; /* Grønn farge for riktig gjettede verdensdeler */
            pointer-events: none; /* Forhindrer å gjette samme to ganger */
        }

        .wrong {
            fill: #f87171 !important; /* Rød farge ved feil */
        }

        .unmapped-country {
            fill: #cbd5e1;
            pointer-events: none; /* Visse små øyer utenfor datasettet vårt klikkes ikke på */
        }

        /* Verktøytips */
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-sky-50 h-screen w-screen flex flex-col relative">

    <!-- Toppmeny / UI -->
    <header class="absolute top-0 left-0 w-full p-4 z-10 flex flex-col md:flex-row justify-between items-center gap-4 pointer-events-none">
        <div class="bg-white/90 shadow-lg rounded-xl p-4 pointer-events-auto w-full md:w-auto text-center">
            <h1 class="text-2xl font-bold text-gray-800">Verdenskart Spill</h1>
            <p class="text-sm text-gray-500">Finn verdensdelene</p>
        </div>
        
        <div id="game-status" class="hidden bg-white/95 shadow-lg rounded-xl p-4 pointer-events-auto flex flex-col items-center border-b-4 border-blue-500">
            <div class="text-gray-600 text-sm font-semibold uppercase tracking-wider mb-1">Finn denne verdensdelen:</div>
            <div id="target-continent" class="text-3xl font-bold text-blue-600 mb-2">Europa</div>
            <div class="flex gap-4 text-sm font-semibold text-gray-700">
                <span>Poeng: <span id="score">0</span> / <span id="total-continents">7</span></span>
                <span>Feil: <span id="mistakes" class="text-red-500">0</span></span>
                <span>Tid: <span id="timer" class="text-blue-500 font-mono">00:00</span></span>
            </div>
        </div>
    </header>

    <!-- Feedback Overlay (Riktig/Feil melding) -->
    <div id="feedback" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 text-4xl md:text-6xl font-bold opacity-0 transition-opacity duration-300 pointer-events-none drop-shadow-md text-center w-full">
        Riktig!
    </div>

    <!-- Verktøytips (Tooltip) -->
    <div id="tooltip"></div>

    <!-- Kartkonteiner -->
    <main class="flex-grow w-full h-full cursor-grab active:cursor-grabbing" id="map-container">
        <svg id="map" class="w-full h-full"></svg>
    </main>

    <!-- Start/Laste-skjerm Modal -->
    <div id="modal" class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm z-30 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Klar for å finne verdensdelene?</h2>
            <p id="loading-text" class="text-gray-600 mb-6">Laster inn kartdata...</p>
            <button id="start-btn" class="hidden w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200 transform hover:scale-105">
                Start Spill
            </button>
            <div id="game-over-stats" class="hidden mt-4 text-left bg-gray-50 p-4 rounded-lg">
                <p class="font-semibold text-lg mb-2 border-b pb-1">Resultat:</p>
                <p>Riktige: <span id="final-score" class="text-green-600 font-bold">0</span></p>
                <p>Feil: <span id="final-mistakes" class="text-red-600 font-bold">0</span></p>
                <p>Tid brukt: <span id="final-time" class="text-blue-600 font-bold font-mono">00:00</span></p>
            </div>
        </div>
    </div>

    <script>
        // Mapping for å koble engelske landnavn i datasettet til riktig verdensdel
        const continentMap = {
            "Nord-Amerika": ["Canada", "USA", "United States of America", "Mexico", "Greenland", "Guatemala", "Belize", "Honduras", "El Salvador", "Nicaragua", "Costa Rica", "Panama", "Cuba", "Jamaica", "Haiti", "Dominican Republic", "Bahamas", "The Bahamas", "Puerto Rico"],
            "Sør-Amerika": ["Colombia", "Venezuela", "Guyana", "Suriname", "Ecuador", "Peru", "Brazil", "Bolivia", "Paraguay", "Chile", "Argentina", "Uruguay", "Falkland Islands", "French Guiana"],
            "Europa": ["Norway", "Sweden", "Finland", "Iceland", "United Kingdom", "England", "Ireland", "Denmark", "Estonia", "Latvia", "Lithuania", "Belarus", "Poland", "Germany", "Netherlands", "Belgium", "Luxembourg", "France", "Switzerland", "Austria", "Czech Republic", "Slovakia", "Hungary", "Ukraine", "Moldova", "Romania", "Serbia", "Republic of Serbia", "Kosovo", "Montenegro", "Bosnia and Herzegovina", "Croatia", "Slovenia", "Italy", "San Marino", "Monaco", "Spain", "Portugal", "Andorra", "Malta", "Greece", "Albania", "Macedonia", "North Macedonia", "Bulgaria", "Cyprus"],
            "Asia": ["Russia", "Turkey", "Georgia", "Armenia", "Azerbaijan", "Kazakhstan", "Uzbekistan", "Turkmenistan", "Kyrgyzstan", "Tajikistan", "Afghanistan", "Iran", "Iraq", "Syria", "Lebanon", "Israel", "Palestine", "Jordan", "Saudi Arabia", "Yemen", "Oman", "United Arab Emirates", "Qatar", "Kuwait", "Pakistan", "India", "Nepal", "Bhutan", "Bangladesh", "Sri Lanka", "Maldives", "Myanmar", "Thailand", "Laos", "Vietnam", "Cambodia", "Malaysia", "Singapore", "Indonesia", "Brunei", "Philippines", "China", "Mongolia", "North Korea", "South Korea", "Japan", "Taiwan", "Timor-Leste"],
            "Afrika": ["Morocco", "Algeria", "Tunisia", "Libya", "Egypt", "Western Sahara", "Mauritania", "Mali", "Niger", "Chad", "Sudan", "South Sudan", "Eritrea", "Djibouti", "Somalia", "Somaliland", "Ethiopia", "Senegal", "Gambia", "Guinea-Bissau", "Guinea", "Sierra Leone", "Liberia", "Ivory Coast", "Cote d'Ivoire", "Burkina Faso", "Ghana", "Togo", "Benin", "Nigeria", "Cameroon", "Central African Republic", "Equatorial Guinea", "Gabon", "Republic of the Congo", "Democratic Republic of the Congo", "Angola", "Zambia", "Malawi", "Mozambique", "Zimbabwe", "Botswana", "Namibia", "South Africa", "Lesotho", "Eswatini", "Swaziland", "Madagascar", "Mauritius", "Comoros", "Seychelles", "Rwanda", "Burundi", "Uganda", "Kenya", "Tanzania", "United Republic of Tanzania"],
            "Oseania": ["Australia", "Papua New Guinea", "New Zealand", "Fiji", "Solomon Islands", "Vanuatu", "New Caledonia", "Samoa", "Kiribati", "Micronesia", "Tonga", "Marshall Islands", "Palau", "Tuvalu", "Nauru"],
            "Antarktis": ["Antarctica"]
        };

        // Omvendt ordbok for raskt oppslag: "Norway" -> "Europa"
        const countryToContinent = {};
        for (const [continent, countries] of Object.entries(continentMap)) {
            for (const country of countries) {
                countryToContinent[country] = continent;
            }
        }

        // Hjelpefunksjon for å lage en ren CSS-klasse basert på verdensdel-navnet
        function getContinentClass(continentName) {
            return "continent-" + continentName.toLowerCase().replace(/[^a-z0-9]/g, '-');
        }

        // Variabler for spillstatus
        let gameQueue = [];
        let currentTarget = null;
        let score = 0;
        let mistakes = 0;
        const totalContinents = Object.keys(continentMap).length; // 7 verdensdeler
        let isWaitingForAnimation = false;
        
        // Timer variabler
        let startTime = null;
        let timerInterval = null;

        // D3 Oppsett
        const width = 1000;
        const height = 600; // Litt bredere format for verdenskart
        const svg = d3.select("#map")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("preserveAspectRatio", "xMidYMid meet");

        const g = svg.append("g");

        // Zoom og Panorering
        const zoom = d3.zoom()
            .scaleExtent([1, 8])
            .translateExtent([[0, 0], [width, height]])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
        
        svg.call(zoom);

        // Geografisk projeksjon (Natural Earth 1 er veldig bra for hele verden)
        const projection = d3.geoNaturalEarth1()
            .scale(170)
            .translate([width / 2, height / 2.2]); // Sentrerer litt oppover for å få med Antarktis bra

        const path = d3.geoPath().projection(projection);
        const tooltip = d3.select("#tooltip");

        // Hent GeoJSON data for hele verden
        d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
            .then(data => {
                // Tegn kartet
                g.selectAll("path")
                    .data(data.features)
                    .enter()
                    .append("path")
                    .attr("d", path)
                    .attr("class", d => {
                        const engName = d.properties.name;
                        const continent = countryToContinent[engName];
                        const baseClass = "country ";
                        // Gir hvert land en klasse som forteller hvilken verdensdel det tilhører
                        return continent ? baseClass + getContinentClass(continent) : baseClass + "unmapped-country";
                    })
                    .on("click", handleContinentClick)
                    .on("mousemove", handleMouseMove)
                    .on("mouseleave", handleMouseLeave);

                // Oppdater UI for å vise at spillet er klart
                document.getElementById('loading-text').classList.add('hidden');
                document.getElementById('start-btn').classList.remove('hidden');
            })
            .catch(error => {
                document.getElementById('loading-text').innerText = "Kunne ikke laste kartdata. Prøv å oppdatere siden.";
                console.error("Error loading map data:", error);
            });

        // Hendelsesfunksjoner
        document.getElementById('start-btn').addEventListener('click', startGame);

        function updateTimer() {
            const nå = Math.floor((Date.now() - startTime) / 1000);
            const minutter = String(Math.floor(nå / 60)).padStart(2, '0');
            const sekunder = String(nå % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${minutter}:${sekunder}`;
        }

        function startGame() {
            // Nullstill UI og variabler
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('game-status').classList.remove('hidden');
            document.getElementById('game-over-stats').classList.add('hidden');
            
            score = 0;
            mistakes = 0;
            updateScoreUI();
            
            // Nullstill og start timer
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "00:00";
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);

            // Fjern eksisterende klasser (hvis man spiller på nytt)
            d3.selectAll('.country')
                .classed('guessed', false)
                .classed('wrong', false);

            // Lag en tilfeldig rekkefølge av verdensdelene
            const allContinents = Object.keys(continentMap);
            gameQueue = [...allContinents].sort(() => Math.random() - 0.5);
            nextTurn();
        }

        function nextTurn() {
            if (gameQueue.length === 0) {
                endGame();
                return;
            }
            currentTarget = gameQueue.pop();
            document.getElementById('target-continent').innerText = currentTarget;
        }

        function handleContinentClick(event, d) {
            if (isWaitingForAnimation || !currentTarget) return;

            const clickedEngName = d.properties.name;
            const clickedContinent = countryToContinent[clickedEngName];

            // Hvis det er et land som ikke hører til noen av de store verdensdelene (f.eks småøyer), ignorer klikket
            if (!clickedContinent) return;

            const continentClass = "." + getContinentClass(clickedContinent);
            const elements = d3.selectAll(continentClass);
            
            // Ignorer hvis verdensdelen allerede er gjettet
            if (elements.classed('guessed')) return;

            if (clickedContinent === currentTarget) {
                // Riktig gjettet! Farglegg HELE verdensdelen
                score++;
                elements.classed('guessed', true);
                showFeedback("Riktig!", "text-green-500");
                updateScoreUI();
                nextTurn();
            } else {
                // Feil gjettet
                mistakes++;
                updateScoreUI();
                
                // Blink HELE den feilaktige verdensdelen i rødt
                elements.classed('wrong', true);
                showFeedback(`Feil! Dette er ${clickedContinent}`, "text-red-500");
                
                isWaitingForAnimation = true;
                
                setTimeout(() => {
                    elements.classed('wrong', false);
                    isWaitingForAnimation = false;
                }, 1500);
            }
        }

        function handleMouseMove(event, d) {
            const engName = d.properties.name;
            const continent = countryToContinent[engName];

            // Skru av eventuelle gamle hover-effekter først
            d3.selectAll('.country').classed('continent-hover', false);

            if (continent) {
                const continentClass = getContinentClass(continent);
                const elements = d3.selectAll('.' + continentClass);
                
                // Legg til hover-effekt på hele verdensdelen
                if (!elements.classed('guessed')) {
                    elements.classed('continent-hover', true);
                }

                // Vis navn i tooltip kun hvis verdensdelen allerede er ferdig gjettet, eller spillet er over
                if (elements.classed('guessed') || !currentTarget) {
                    tooltip.style("opacity", 1)
                        .html(continent)
                        .style("left", (event.pageX + 15) + "px")
                        .style("top", (event.pageY - 28) + "px");
                } else {
                    tooltip.style("opacity", 0);
                }
            } else {
                tooltip.style("opacity", 0);
            }
        }

        function handleMouseLeave(event, d) {
            // Skru av hover-effekten når musen forlater et land
            d3.selectAll('.country').classed('continent-hover', false);
            tooltip.style("opacity", 0);
        }

        function updateScoreUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('mistakes').innerText = mistakes;
        }

        function showFeedback(text, colorClass) {
            const fb = document.getElementById('feedback');
            fb.innerText = text;
            fb.className = `absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 text-4xl md:text-6xl font-bold drop-shadow-lg transition-opacity duration-300 pointer-events-none ${colorClass}`;
            fb.style.opacity = 1;
            
            setTimeout(() => {
                fb.style.opacity = 0;
            }, 1200);
        }

        function endGame() {
            currentTarget = null;
            clearInterval(timerInterval); // Stopp timeren
            
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('game-status').classList.add('hidden');
            document.querySelector('#modal h2').innerText = "Du fant alle verdensdelene!";
            document.getElementById('start-btn').innerText = "Spill igjen";
            
            document.getElementById('game-over-stats').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-mistakes').innerText = mistakes;
            document.getElementById('final-time').innerText = document.getElementById('timer').innerText; // Kopier tiden
        }
    </script>
</body>
</html>
