<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sør-Amerika Kartspill</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- D3.js for kart og interaksjon -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Forhindrer scroll utenfor kartet */
        }
        
        /* Kartstiler */
        .country {
            stroke: #94a3b8;
            stroke-width: 0.5px;
            vector-effect: non-scaling-stroke; 
            transition: fill 0.2s ease;
        }
        
        .sa-country {
            fill: #ffffff;
            cursor: pointer;
        }
        
        .sa-country:hover {
            fill: #e2e8f0;
        }
        
        .other-country {
            fill: #cbd5e1;
            cursor: pointer;
        }
        
        .guessed {
            fill: #4ade80 !important; /* Grønn farge for riktig gjettede land */
            pointer-events: none; 
        }

        .wrong {
            fill: #f87171 !important; /* Rød farge ved feil */
        }

        /* Verktøytips */
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-sky-100 h-screen w-screen flex flex-col relative">

    <!-- Toppmeny / UI -->
    <header class="absolute top-0 left-0 w-full p-4 z-10 flex flex-col md:flex-row justify-between items-center gap-4 pointer-events-none">
        <div class="bg-white/90 shadow-lg rounded-xl p-4 pointer-events-auto w-full md:w-auto text-center">
            <h1 class="text-2xl font-bold text-gray-800">Sør-Amerika Kartspill</h1>
            <p class="text-sm text-gray-500">Finn alle landene i Sør-Amerika</p>
        </div>
        
        <div id="game-status" class="hidden bg-white/95 shadow-lg rounded-xl p-4 pointer-events-auto flex flex-col items-center border-b-4 border-blue-500">
            <div class="text-gray-600 text-sm font-semibold uppercase tracking-wider mb-1">Finn dette landet:</div>
            <div id="target-country" class="text-3xl font-bold text-blue-600 mb-2">Brasil</div>
            <div class="flex gap-4 text-sm font-semibold text-gray-700">
                <span>Poeng: <span id="score">0</span> / <span id="total-countries">0</span></span>
                <span>Feil: <span id="mistakes" class="text-red-500">0</span></span>
            </div>
        </div>
    </header>

    <!-- Feedback Overlay -->
    <div id="feedback" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 text-4xl md:text-6xl font-bold opacity-0 transition-opacity duration-300 pointer-events-none drop-shadow-md">
        Riktig!
    </div>

    <!-- Verktøytips -->
    <div id="tooltip"></div>

    <main class="flex-grow w-full h-full cursor-grab active:cursor-grabbing" id="map-container">
        <svg id="map" class="w-full h-full"></svg>
    </main>

    <!-- Modaler -->
    <div id="modal" class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm z-30 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Sør-Amerika Quiz</h2>
            <p id="loading-text" class="text-gray-600 mb-6">Laster inn kartdata...</p>
            <button id="start-btn" class="hidden w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-200 transform hover:scale-105">
                Start Spill
            </button>
            <div id="game-over-stats" class="hidden mt-4 text-left bg-gray-50 p-4 rounded-lg">
                <p class="font-semibold">Resultat:</p>
                <p>Riktige: <span id="final-score" class="text-green-600 font-bold">0</span></p>
                <p>Feil: <span id="final-mistakes" class="text-red-600 font-bold">0</span></p>
            </div>
        </div>
    </div>

    <script>
        // Omfattende ordbok for Sør-Amerika og resten av verden
        const norNames = {
            // Sør-Amerika (Mål)
            "Argentina": "Argentina",
            "Bolivia": "Bolivia",
            "Brazil": "Brasil",
            "Chile": "Chile",
            "Colombia": "Colombia",
            "Ecuador": "Ecuador",
            "Guyana": "Guyana",
            "Paraguay": "Paraguay",
            "Peru": "Peru",
            "Suriname": "Surinam",
            "Uruguay": "Uruguay",
            "Venezuela": "Venezuela",
            "French Guiana": "Fransk Guyana",
            "Falkland Islands": "Falklandsøyene",

            // Resten av verden (Eksempler for feilmeldinger)
            "Norway": "Norge", "Sweden": "Sverige", "Denmark": "Danmark", "Finland": "Finland", "Iceland": "Island",
            "United States": "USA", "USA": "USA", "Canada": "Canada", "Mexico": "Mexico",
            "Russia": "Russland", "China": "Kina", "India": "India", "Australia": "Australia",
            "United Kingdom": "Storbritannia", "France": "Frankrike", "Germany": "Tyskland",
            "Spain": "Spania", "Italy": "Italia", "Greece": "Hellas", "Turkey": "Tyrkia",
            "Egypt": "Egypt", "South Africa": "Sør-Afrika", "Japan": "Japan", "South Korea": "Sør-Korea",
            "Antarctica": "Antarktis", "Greenland": "Grønland", "Algeria": "Algerie", "Libya": "Libya",
            "Kazakhstan": "Kasakhstan", "Mongolia": "Mongolia", "Saudi Arabia": "Saudi-Arabia",
            "Iran": "Iran", "Iraq": "Irak", "Poland": "Polen", "Ukraine": "Ukraina"
            // Kartet bruker engelske navn, så vi oversetter de mest kjente her.
        };

        // Spesifikk liste for Sør-Amerika-mål
        const targetList = [
            "Argentina", "Bolivia", "Brasil", "Chile", "Colombia", "Ecuador", 
            "Guyana", "Paraguay", "Peru", "Surinam", "Uruguay", "Venezuela", 
            "Fransk Guyana", "Falklandsøyene"
        ];

        let gameQueue = [];
        let currentTarget = null;
        let score = 0;
        let mistakes = 0;
        let isWaitingForAnimation = false;

        const width = 1000;
        const height = 800;
        const svg = d3.select("#map")
            .attr("viewBox", `0 0 ${width} ${height}`)
            .attr("preserveAspectRatio", "xMidYMid meet");

        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([1, 8])
            .translateExtent([[0, 0], [width, height]])
            .on("zoom", (event) => g.attr("transform", event.transform));
        
        svg.call(zoom);

        const projection = d3.geoMercator()
            .scale(130)
            .translate([width / 2, height / 1.7]);

        const path = d3.geoPath().projection(projection);
        const tooltip = d3.select("#tooltip");

        d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
            .then(data => {
                // Klipp ut territorier
                data.features.forEach(feature => {
                    if (feature.properties.name === "France" && feature.geometry.type === "MultiPolygon") {
                        let main = [], fg = [];
                        feature.geometry.coordinates.forEach(poly => {
                            const lon = poly[0][0][0];
                            const lat = poly[0][0][1];
                            if (lon < -40 && lat > 0 && lat < 15) fg.push(poly);
                            else main.push(poly);
                        });
                        if (fg.length > 0) {
                            feature.geometry.coordinates = main;
                            data.features.push({
                                type: "Feature",
                                properties: { name: "French Guiana" },
                                geometry: { type: "MultiPolygon", coordinates: fg }
                            });
                        }
                    }
                    if (feature.properties.name === "United Kingdom" && feature.geometry.type === "MultiPolygon") {
                        let main = [], fk = [];
                        feature.geometry.coordinates.forEach(poly => {
                            const lon = poly[0][0][0];
                            const lat = poly[0][0][1];
                            if (lon < -50 && lat < -40) fk.push(poly);
                            else main.push(poly);
                        });
                        if (fk.length > 0) {
                            feature.geometry.coordinates = main;
                            data.features.push({
                                type: "Feature",
                                properties: { name: "Falkland Islands" },
                                geometry: { type: "MultiPolygon", coordinates: fk }
                            });
                        }
                    }
                });

                g.selectAll("path")
                    .data(data.features)
                    .enter()
                    .append("path")
                    .attr("d", path)
                    .attr("class", d => {
                        const name = d.properties.name;
                        const norName = norNames[name] || name;
                        return targetList.includes(norName) ? "country sa-country" : "country other-country";
                    })
                    .on("click", handleCountryClick)
                    .on("mousemove", handleMouseMove)
                    .on("mouseleave", handleMouseLeave);

                document.getElementById('loading-text').classList.add('hidden');
                document.getElementById('start-btn').classList.remove('hidden');
            });

        document.getElementById('start-btn').addEventListener('click', startGame);

        function startGame() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('game-status').classList.remove('hidden');
            score = 0; mistakes = 0;
            updateScoreUI();
            document.getElementById('total-countries').innerText = targetList.length;
            d3.selectAll('.sa-country').classed('guessed', false).classed('wrong', false);
            gameQueue = [...targetList].sort(() => Math.random() - 0.5);
            nextTurn();
        }

        function nextTurn() {
            if (gameQueue.length === 0) return endGame();
            currentTarget = gameQueue.pop();
            document.getElementById('target-country').innerText = currentTarget;
        }

        function handleCountryClick(event, d) {
            if (isWaitingForAnimation || !currentTarget) return;
            const element = d3.select(this);
            if (element.classed('guessed')) return;

            const engName = d.properties.name;
            const clickedName = norNames[engName] || engName;

            if (clickedName === currentTarget) {
                score++;
                element.classed('guessed', true);
                showFeedback("Riktig!", "text-green-500");
                updateScoreUI();
                nextTurn();
            } else {
                mistakes++;
                updateScoreUI();
                element.classed('wrong', true);
                showFeedback(`Feil! Dette er ${clickedName}`, "text-red-500");
                isWaitingForAnimation = true;
                setTimeout(() => {
                    element.classed('wrong', false);
                    isWaitingForAnimation = false;
                }, 1500);
            }
        }

        function handleMouseMove(event, d) {
            const name = d.properties.name;
            const norName = norNames[name] || name;
            const element = d3.select(this);
            if (element.classed('guessed') || !currentTarget) {
                tooltip.style("opacity", 1).html(norName)
                    .style("left", (event.pageX + 15) + "px").style("top", (event.pageY - 28) + "px");
            } else {
                tooltip.style("opacity", 0);
            }
        }

        function handleMouseLeave() { tooltip.style("opacity", 0); }
        function updateScoreUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('mistakes').innerText = mistakes;
        }

        function showFeedback(text, colorClass) {
            const fb = document.getElementById('feedback');
            fb.innerText = text;
            fb.className = `absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 text-4xl md:text-6xl font-bold drop-shadow-lg transition-opacity duration-300 pointer-events-none ${colorClass}`;
            fb.style.opacity = 1;
            setTimeout(() => fb.style.opacity = 0, 1200);
        }

        function endGame() {
            currentTarget = null;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('game-status').classList.add('hidden');
            document.querySelector('#modal h2').innerText = "Spillet er ferdig!";
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-mistakes').innerText = mistakes;
            document.getElementById('game-over-stats').classList.remove('hidden');
            document.getElementById('start-btn').innerText = "Spill igjen";
        }
    </script>
</body>
</html>
