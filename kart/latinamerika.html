<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Latin-Amerika Geografi Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --ocean: #e0f2fe;
            --land-base: #ffffff;
            --land-stroke: #94a3b8;
            --correct: #22c55e;
            --wrong: #ef4444;
            --highlight: #facc15;
            --accent-blue: #3b82f6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .sidebar {
                height: auto;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
        }

        .sidebar {
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            z-index: 20;
            box-shadow: 4px 0 15px rgba(0,0,0,0.02);
            overflow: hidden;
        }

        .map-area {
            background-color: var(--ocean);
            background-image: radial-gradient(#bae6fd 1.2px, transparent 1.2px);
            background-size: 35px 35px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .country-path {
            fill: var(--land-base);
            stroke: var(--land-stroke);
            stroke-width: 0.7;
            transition: all 0.2s ease;
        }

        .country-path.active-hover {
            fill: var(--highlight);
            stroke: #854d0e;
            stroke-width: 1.5;
            cursor: pointer;
        }

        .country-path.is-correct {
            fill: var(--correct);
            stroke: #14532d;
        }

        .country-path.is-wrong {
            fill: var(--wrong);
            stroke: #7f1d1d;
        }

        .country-label {
            font-size: 14px;
            font-weight: 700;
            fill: #1e293b;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-anchor: middle;
            paint-order: stroke;
            stroke: white;
            stroke-width: 3px;
            stroke-linejoin: round;
        }

        .country-label.show {
            opacity: 1;
        }

        .draggable-name {
            touch-action: none;
            user-select: none;
            cursor: grab;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
            background: white;
        }

        .draggable-name:hover {
            border-color: var(--accent-blue);
            background-color: #f1f5f9;
        }

        .floating-label {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
            white-space: nowrap;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .shake { animation: shake 0.3s ease-in-out; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-layout">
        <aside class="sidebar flex flex-col h-full">
            <div class="p-6 pb-0">
                <h1 class="text-2xl font-black tracking-tighter text-blue-600">Latin-Amerika</h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-4">Geografisk Oversikt</p>

                <div class="flex gap-2 mb-6">
                    <div class="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                        <span class="block text-[9px] text-slate-400 font-bold uppercase">Resultat</span>
                        <span id="score-text" class="text-xl font-black text-slate-700">0 / 21</span>
                    </div>
                    <div class="flex-1 bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                        <span class="block text-[9px] text-slate-400 font-bold uppercase">Tid</span>
                        <span id="timer-text" class="text-xl font-black text-slate-700">0:00</span>
                    </div>
                </div>

                <div class="text-xs font-bold text-slate-400 uppercase mb-3 tracking-wider">Landliste:</div>
            </div>
            
            <div id="names-container" class="flex-grow overflow-y-auto custom-scroll px-6 pb-6 space-y-2"></div>
        </aside>

        <main class="map-area">
            <svg id="svg-map" viewBox="0 0 1000 1600" class="h-full w-auto">
                <g id="countries-layer">
                    <!-- MELLOM-AMERIKA (Oppdaterte stier for bedre treffområde) -->
                    <!-- Mexico -->
                    <path id="mexico" d="M20,50 L200,50 L250,150 L220,250 L180,260 L100,280 L50,200 Z" class="country-path" />
                    <text x="135" y="150" class="country-label" data-id="mexico">Mexico</text>

                    <!-- Guatemala -->
                    <path id="guatemala" d="M100,280 L180,260 L180,280 L195,330 L130,350 L90,320 Z" class="country-path" />
                    <text x="135" y="315" class="country-label" data-id="guatemala">Guatemala</text>

                    <!-- Belize (Forstørret treffområde) -->
                    <path id="belize" d="M180,260 L220,270 L215,315 L180,310 L180,260 Z" class="country-path" />
                    <text x="200" y="295" class="country-label" data-id="belize" style="font-size: 11px;">Belize</text>

                    <!-- El Salvador -->
                    <path id="el_salvador" d="M130,350 L170,355 L175,395 L135,390 Z" class="country-path" />
                    <text x="152" y="385" class="country-label" data-id="el_salvador" style="font-size: 8px;">El Salvador</text>

                    <!-- Honduras -->
                    <path id="honduras" d="M180,280 L250,290 L260,350 L195,330 Z" class="country-path" />
                    <text x="220" y="320" class="country-label" data-id="honduras" style="font-size: 11px;">Honduras</text>

                    <!-- Nicaragua -->
                    <path id="nicaragua" d="M195,330 L260,350 L270,410 L210,420 L195,330 Z" class="country-path" />
                    <text x="235" y="385" class="country-label" data-id="nicaragua">Nicaragua</text>

                    <!-- Costa Rica -->
                    <path id="costa_rica" d="M210,420 L270,410 L260,450 L220,460 Z" class="country-path" />
                    <text x="240" y="445" class="country-label" data-id="costa_rica" style="font-size: 9px;">Costa Rica</text>

                    <!-- Panama -->
                    <path id="panama" d="M220,460 L280,445 L320,460 L310,490 L220,490 Z" class="country-path" />
                    <text x="270" y="485" class="country-label" data-id="panama" style="font-size: 10px;">Panama</text>

                    <!-- SØR-AMERIKA -->
                    <path id="colombia" d="M310,490 L370,480 L420,500 L460,550 L400,640 L340,640 L290,560 Z" class="country-path" />
                    <text x="370" y="570" class="country-label" data-id="colombia">Colombia</text>

                    <path id="venezuela" d="M420,500 L470,470 L560,460 L620,490 L640,540 L570,580 L460,550 Z" class="country-path" />
                    <text x="520" y="520" class="country-label" data-id="venezuela">Venezuela</text>

                    <path id="guyana" d="M620,490 L680,495 L690,550 L640,540 Z" class="country-path" />
                    <text x="655" y="520" class="country-label" data-id="guyana" style="font-size: 10px;">Guyana</text>

                    <path id="surinam" d="M680,495 L730,505 L740,560 L690,550 Z" class="country-path" />
                    <text x="710" y="535" class="country-label" data-id="surinam" style="font-size: 10px;">Surinam</text>

                    <path id="fransk_guyana" d="M730,505 L770,515 L780,570 L740,560 Z" class="country-path" />
                    <text x="755" y="550" class="country-label" data-id="fransk_guyana" style="font-size: 8px;">Fransk Guyana</text>

                    <path id="ecuador" d="M260,620 L290,580 L360,640 L310,690 L250,660 Z" class="country-path" />
                    <text x="300" y="645" class="country-label" data-id="ecuador" style="font-size: 10px;">Ecuador</text>

                    <path id="peru" d="M250,660 L310,690 L360,640 L420,630 L460,690 L500,790 L420,860 L330,790 L230,690 Z" class="country-path" />
                    <text x="340" y="740" class="country-label" data-id="peru">Peru</text>

                    <path id="bolivia" d="M460,690 L540,690 L600,760 L580,870 L480,890 L420,860 Z" class="country-path" />
                    <text x="500" y="790" class="country-label" data-id="bolivia">Bolivia</text>

                    <path id="brasil" d="M460,550 L570,580 L640,540 L690,550 L740,560 L780,570 L870,610 L970,710 L940,960 L820,1060 L720,1060 L670,990 L580,870 L600,760 L540,690 L460,690 Z" class="country-path" />
                    <text x="700" y="790" class="country-label" data-id="brasil" style="font-size: 24px;">Brasil</text>

                    <path id="paraguay" d="M580,870 L670,870 L690,960 L610,990 L580,950 Z" class="country-path" />
                    <text x="630" y="930" class="country-label" data-id="paraguay" style="font-size: 11px;">Paraguay</text>

                    <path id="uruguay" d="M680,1060 L760,1050 L780,1120 L700,1140 Z" class="country-path" />
                    <text x="740" y="1100" class="country-label" data-id="uruguay" style="font-size: 10px;">Uruguay</text>
                    
                    <path id="chile" d="M420,860 L480,890 L450,1010 L410,1210 L370,1410 L390,1560 L330,1560 L310,1410 L340,1210 L360,1010 L320,860 Z" class="country-path" />
                    <text x="360" y="1160" class="country-label" data-id="chile" style="font-size: 14px; transform: rotate(90deg); transform-origin: 360px 1160px;">Chile</text>
                    
                    <path id="argentina" d="M480,890 L580,870 L580,950 L610,990 L680,1060 L700,1140 L620,1410 L570,1560 L390,1560 L370,1410 L410,1210 L450,1010 Z" class="country-path" />
                    <text x="500" y="1160" class="country-label" data-id="argentina">Argentina</text>
                </g>
            </svg>

            <div id="win-overlay" class="hidden absolute inset-0 bg-white/80 backdrop-blur-md flex items-center justify-center z-50 p-8">
                <div class="bg-white p-12 rounded-[3rem] text-slate-900 text-center shadow-2xl border border-slate-100 max-w-sm">
                    <div class="text-6xl mb-4">🏆</div>
                    <h2 class="text-3xl font-black mb-2 text-blue-600">Fantastisk!</h2>
                    <p id="final-time" class="text-lg font-bold text-slate-500 mb-8">Tid: 0:00</p>
                    <button onclick="location.reload()" class="w-full bg-blue-600 text-white px-10 py-4 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-lg">Spill igjen</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const countries = [
            { id: 'mexico', name: 'Mexico' }, { id: 'guatemala', name: 'Guatemala' },
            { id: 'belize', name: 'Belize' }, { id: 'el_salvador', name: 'El Salvador' },
            { id: 'honduras', name: 'Honduras' }, { id: 'nicaragua', name: 'Nicaragua' },
            { id: 'costa_rica', name: 'Costa Rica' }, { id: 'panama', name: 'Panama' },
            { id: 'argentina', name: 'Argentina' }, { id: 'bolivia', name: 'Bolivia' },
            { id: 'brasil', name: 'Brasil' }, { id: 'chile', name: 'Chile' },
            { id: 'colombia', name: 'Colombia' }, { id: 'ecuador', name: 'Ecuador' },
            { id: 'guyana', name: 'Guyana' }, { id: 'paraguay', name: 'Paraguay' },
            { id: 'peru', name: 'Peru' }, { id: 'surinam', name: 'Surinam' },
            { id: 'uruguay', name: 'Uruguay' }, { id: 'venezuela', name: 'Venezuela' },
            { id: 'fransk_guyana', name: 'Fransk Guyana' }
        ];

        let score = 0;
        let startTime = Date.now();
        let timerInterval;

        function updateTimer() {
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            const mins = Math.floor(diff / 60);
            const secs = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer-text').textContent = `${mins}:${secs}`;
        }

        function init() {
            const container = document.getElementById('names-container');
            container.innerHTML = '';
            
            [...countries].sort(() => Math.random() - 0.5).forEach(country => {
                const div = document.createElement('div');
                div.className = 'draggable-name p-3 rounded-xl font-bold text-sm shadow-sm border border-slate-200';
                div.textContent = country.name;
                div.dataset.id = country.id;
                div.draggable = true;
                div.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', country.id);
                    div.classList.add('opacity-30');
                });
                div.addEventListener('dragend', () => div.classList.remove('opacity-30'));
                div.addEventListener('touchstart', handleTouchStart, {passive: false});
                div.addEventListener('touchmove', handleTouchMove, {passive: false});
                div.addEventListener('touchend', handleTouchEnd);
                container.appendChild(div);
            });

            document.querySelectorAll('.country-path').forEach(path => {
                path.addEventListener('dragover', e => e.preventDefault());
                path.addEventListener('dragenter', () => path.classList.add('active-hover'));
                path.addEventListener('dragleave', () => path.classList.remove('active-hover'));
                path.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const id = e.dataTransfer.getData('text/plain');
                    checkMatch(id, path.id);
                });
            });

            timerInterval = setInterval(updateTimer, 1000);
        }

        function checkMatch(draggedId, targetId) {
            const pathElement = document.getElementById(targetId);
            if (!pathElement) return;
            pathElement.classList.remove('active-hover');

            if (draggedId === targetId) {
                if (pathElement.classList.contains('is-correct')) return;
                pathElement.classList.add('is-correct');
                const label = document.querySelector(`.country-label[data-id="${targetId}"]`);
                if (label) label.classList.add('show');
                score++;
                document.getElementById('score-text').textContent = `${score} / ${countries.length}`;
                document.querySelectorAll('.draggable-name').forEach(el => {
                    if (el.dataset.id === draggedId) el.remove();
                });
                if (score === countries.length) win();
            } else {
                pathElement.classList.add('is-wrong', 'shake');
                setTimeout(() => pathElement.classList.remove('is-wrong', 'shake'), 500);
            }
        }

        let ghost = null;
        let currentTouchTarget = null;

        function handleTouchStart(e) {
            const touch = e.touches[0];
            ghost = this.cloneNode(true);
            ghost.className = 'floating-label';
            document.body.appendChild(ghost);
            updateGhostPos(touch);
            e.preventDefault();
        }

        function handleTouchMove(e) {
            const touch = e.touches[0];
            updateGhostPos(touch);
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.country-path').forEach(p => p.classList.remove('active-hover'));
            if (target && target.classList.contains('country-path')) {
                target.classList.add('active-hover');
                currentTouchTarget = target;
            }
        }

        function handleTouchEnd(e) {
            if (ghost) {
                const id = ghost.dataset.id;
                if (currentTouchTarget) checkMatch(id, currentTouchTarget.id);
                ghost.remove();
                ghost = null;
                currentTouchTarget = null;
            }
        }

        function updateGhostPos(t) {
            ghost.style.left = t.clientX + 'px';
            ghost.style.top = (t.clientY - 40) + 'px';
            ghost.style.transform = 'translate(-50%, -50%)';
        }

        function win() {
            clearInterval(timerInterval);
            document.getElementById('win-overlay').classList.remove('hidden');
            document.getElementById('final-time').textContent = `Tid: ${document.getElementById('timer-text').textContent}`;
        }

        window.onload = init;
    </script>
</body>
</html>
